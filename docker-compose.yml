services:
    postgres:
        image: ${POSTGRES_IMAGE:-postgres:16}
        container_name: ${POSTGRES_CONTAINER_NAME:-payment-postgres}
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-paymentdb}
            POSTGRES_USER: ${POSTGRES_USER:-payment}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - ${POSTGRES_VOLUME_NAME:-pg_payment_data}:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-paymentdb}"]
            interval: 5s
            timeout: 3s
            retries: 20
        restart: unless-stopped

    zookeeper:
        image: ${ZOOKEEPER_IMAGE:-confluentinc/cp-zookeeper:7.6.1}
        container_name: ${ZOOKEEPER_CONTAINER_NAME:-payment-zookeeper}
        environment:
            ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
            ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME:-2000}
        healthcheck:
            test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/${ZOOKEEPER_CLIENT_PORT:-2181}'"]
            interval: 5s
            timeout: 3s
            retries: 30
        restart: unless-stopped

    kafka:
        image: ${KAFKA_IMAGE:-confluentinc/cp-kafka:7.6.1}
        container_name: ${KAFKA_CONTAINER_NAME:-payment-kafka}
        depends_on:
            zookeeper:
                condition: service_healthy
        ports:
            - "${KAFKA_PORT:-9092}:9092"
        environment:
            KAFKA_BROKER_ID: ${KAFKA_BROKER_ID:-1}
            KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT:-zookeeper:2181}

            KAFKA_LISTENERS: ${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:${KAFKA_INTERNAL_PORT:-29092}}
            KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://localhost:${KAFKA_PORT:-9092},PLAINTEXT_INTERNAL://kafka:${KAFKA_INTERNAL_PORT:-29092}}
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT}
            KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT_INTERNAL}

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS:-0}
        healthcheck:
            test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
            interval: 10s
            timeout: 5s
            retries: 30
        restart: unless-stopped

    kafka-ui:
        image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:latest}
        container_name: ${KAFKA_UI_CONTAINER_NAME:-payment-kafka-ui}
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "${KAFKA_UI_PORT:-8088}:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:-local}
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS:-kafka:${KAFKA_INTERNAL_PORT:-29092}}
        restart: unless-stopped

volumes:
    pg_payment_data:
        name: ${POSTGRES_VOLUME_NAME:-pg_payment_data}
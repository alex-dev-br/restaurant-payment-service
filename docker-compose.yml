services:
    postgres:
        image: ${POSTGRES_IMAGE:-postgres:16}
        container_name: ${POSTGRES_CONTAINER_NAME:-payment-postgres}
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-paymentdb}
            POSTGRES_USER: ${POSTGRES_USER:-payment}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment}
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        volumes:
            - ${POSTGRES_VOLUME_NAME:-pg_payment_data}:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-paymentdb}"]
            interval: 5s
            timeout: 3s
            retries: 20
        restart: unless-stopped
        networks:
            - fase3net

    rabbitmq:
        image: ${RABBITMQ_IMAGE:-rabbitmq:3-management}
        container_name: ${RABBITMQ_CONTAINER_NAME:-payment-rabbitmq}
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
        ports:
            - "${RABBITMQ_PORT:-5672}:5672"
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        healthcheck:
            test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
            interval: 10s
            timeout: 5s
            retries: 30
        restart: unless-stopped
        networks:
            - fase3net

    procpag:
        image: docker.io/erickemprobr/procpag:latest
        platform: linux/amd64
        container_name: ${PROCPAG_CONTAINER_NAME:-payment-procpag}
        ports:
            - "${PROCPAG_PORT:-8089}:8089"
        restart: unless-stopped
        networks:
            - fase3net

volumes:
    pg_payment_data:
        name: ${POSTGRES_VOLUME_NAME:-pg_payment_data}

networks:
    fase3net:
        name: fase3net
        driver: bridge
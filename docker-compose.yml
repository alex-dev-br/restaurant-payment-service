services:
    postgres:
        image: postgres:16
        container_name: payment-postgres
        environment:
            POSTGRES_DB: paymentdb
            POSTGRES_USER: payment
            POSTGRES_PASSWORD: payment
        ports:
            - "5432:5432"
        volumes:
            - pg_payment_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U payment -d paymentdb -h localhost"]
            interval: 5s
            timeout: 3s
            retries: 20
        restart: unless-stopped

    zookeeper:
        image: confluentinc/cp-zookeeper:7.6.1
        container_name: payment-zookeeper
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        healthcheck:
            test: [ "CMD-SHELL", "bash -lc 'echo > /dev/tcp/localhost/2181'" ]
            interval: 5s
            timeout: 3s
            retries: 30
        restart: unless-stopped

    kafka:
        image: confluentinc/cp-kafka:7.6.1
        container_name: payment-kafka
        depends_on:
            zookeeper:
                condition: service_healthy
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        healthcheck:
            test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
            interval: 10s
            timeout: 5s
            retries: 30
        restart: unless-stopped

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: payment-kafka-ui
        depends_on:
            kafka:
                condition: service_healthy
        ports:
            - "8088:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
        restart: unless-stopped

volumes:
    pg_payment_data:
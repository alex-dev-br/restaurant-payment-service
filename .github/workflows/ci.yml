name: CI

on:
    push:
        branches: ["main", "master", "develop"]
    pull_request:
        branches: ["main", "master", "develop"]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-test:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "21"
                  cache: maven

            - name: Make mvnw executable
              run: chmod +x mvnw

            - name: Build + test
              run: ./mvnw -B -ntp verify